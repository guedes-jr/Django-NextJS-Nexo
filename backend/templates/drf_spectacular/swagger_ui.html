<!DOCTYPE html>
<html>
<head>
  <title>NEXO — API Docs</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="{{ swagger_ui_css }}" >
  <style>
    :root {
      --nexo-bg: #0a0e1a;
      --nexo-bg2: #111827;
      --nexo-bg3: #1e293b;
      --nexo-accent: #6366f1;
      --nexo-accent2: #818cf8;
      --nexo-glow: rgba(99, 102, 241, 0.25);
      --nexo-text: #e2e8f0;
      --nexo-muted: #94a3b8;
      --nexo-border: rgba(99, 102, 241, 0.15);
      --nexo-green: #34d399;
      --nexo-yellow: #fbbf24;
      --nexo-red: #f87171;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--nexo-bg);
      font-family: 'Inter', -apple-system, sans-serif;
    }

    /* ══ NEXO TOP BAR ══ */
    #nexo-topbar {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      border-bottom: 1px solid var(--nexo-border);
      padding: 14px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #nexo-topbar .brand { display: flex; align-items: center; gap: 12px; }
    #nexo-topbar .brand .diamond {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      transform: rotate(45deg);
      border-radius: 5px;
      box-shadow: 0 0 20px var(--nexo-glow);
    }
    #nexo-topbar .brand h1 { margin: 0; color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
    #nexo-topbar .brand h1 span { color: var(--nexo-accent2); font-weight: 400; font-size: 13px; margin-left: 8px; letter-spacing: 0; }
    #nexo-topbar .links { display: flex; gap: 6px; }
    #nexo-topbar .links a {
      color: var(--nexo-muted); text-decoration: none; font-size: 13px;
      padding: 6px 14px; border-radius: 8px; border: 1px solid transparent; transition: all 0.2s;
    }
    #nexo-topbar .links a:hover, #nexo-topbar .links a.active {
      color: #fff !important; border-color: var(--nexo-border); background: rgba(99,102,241,0.1);
    }

    /* ══ SWAGGER-UI DARK OVERRIDES ══ */

    .swagger-ui .topbar { display: none !important; }
    .swagger-ui .wrapper { max-width: 1400px; padding: 24px 40px; }

    /* Info */
    .swagger-ui .info { margin: 20px 0 !important; }
    .swagger-ui .info hgroup.main a { display: none; }
    .swagger-ui .info .title { color: #fff !important; font-family: 'Inter', sans-serif !important; font-weight: 700 !important; }
    .swagger-ui .info .title small { background: var(--nexo-accent) !important; border-radius: 6px !important; padding: 4px 10px !important; vertical-align: middle !important; }
    .swagger-ui .info .description, .swagger-ui .info .description p, .swagger-ui .info .description li {
      color: var(--nexo-muted) !important; font-family: 'Inter', sans-serif !important; line-height: 1.7 !important;
    }
    .swagger-ui .info .description h1, .swagger-ui .info .description h2, .swagger-ui .info .description h3 {
      color: var(--nexo-text) !important; border-bottom: 1px solid var(--nexo-border) !important; padding-bottom: 8px !important;
    }
    .swagger-ui .info .description code { background: rgba(99,102,241,0.15) !important; color: var(--nexo-accent2) !important; padding: 2px 6px !important; border-radius: 4px !important; font-family: 'JetBrains Mono', monospace !important; font-size: 13px !important; }
    .swagger-ui .info .description pre { background: var(--nexo-bg3) !important; border: 1px solid var(--nexo-border) !important; border-radius: 10px !important; padding: 16px !important; }
    .swagger-ui .info .description pre code { background: transparent !important; color: var(--nexo-green) !important; }

    /* Tables in description */
    .swagger-ui .info .description table { border-collapse: collapse !important; width: 100% !important; margin: 12px 0 !important; }
    .swagger-ui .info .description table th { background: rgba(99,102,241,0.1) !important; color: var(--nexo-accent2) !important; padding: 10px 14px !important; text-align: left !important; font-weight: 600 !important; border: 1px solid var(--nexo-border) !important; }
    .swagger-ui .info .description table td { color: var(--nexo-text) !important; padding: 10px 14px !important; border: 1px solid var(--nexo-border) !important; }
    .swagger-ui .info .description table tr:nth-child(even) td { background: rgba(255,255,255,0.02) !important; }

    /* Scheme / Auth bar */
    .swagger-ui .scheme-container { background: rgba(17,24,39,0.7) !important; border: 1px solid var(--nexo-border) !important; border-radius: 12px !important; padding: 16px 20px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.25) !important; }

    /* Tag headers */
    .swagger-ui .opblock-tag { color: var(--nexo-text) !important; font-family: 'Inter', sans-serif !important; font-weight: 600 !important; border-bottom: 1px solid var(--nexo-border) !important; }
    .swagger-ui .opblock-tag:hover { background: rgba(99,102,241,0.04) !important; }
    .swagger-ui .opblock-tag small { color: var(--nexo-muted) !important; }

    /* Operation blocks */
    .swagger-ui .opblock { border-radius: 10px !important; border: 1px solid var(--nexo-border) !important; margin: 6px 0 !important; box-shadow: 0 2px 12px rgba(0,0,0,0.12) !important; }
    .swagger-ui .opblock .opblock-summary { padding: 10px 16px !important; }
    .swagger-ui .opblock .opblock-summary-method { border-radius: 6px !important; font-family: 'Inter', sans-serif !important; font-weight: 700 !important; font-size: 12px !important; min-width: 68px !important; text-align: center !important; padding: 6px 0 !important; }
    .swagger-ui .opblock .opblock-summary-path { color: var(--nexo-text) !important; font-weight: 500 !important; }
    .swagger-ui .opblock .opblock-summary-description { color: var(--nexo-muted) !important; }

    /* HTTP method colors */
    .swagger-ui .opblock.opblock-get { background: rgba(52,211,153,0.05) !important; border-color: rgba(52,211,153,0.2) !important; }
    .swagger-ui .opblock.opblock-get .opblock-summary-method { background: #059669 !important; }
    .swagger-ui .opblock.opblock-get .opblock-summary { border-color: rgba(52,211,153,0.2) !important; }
    .swagger-ui .opblock.opblock-post { background: rgba(99,102,241,0.05) !important; border-color: rgba(99,102,241,0.2) !important; }
    .swagger-ui .opblock.opblock-post .opblock-summary-method { background: var(--nexo-accent) !important; }
    .swagger-ui .opblock.opblock-post .opblock-summary { border-color: rgba(99,102,241,0.2) !important; }
    .swagger-ui .opblock.opblock-put, .swagger-ui .opblock.opblock-patch { background: rgba(251,191,36,0.05) !important; border-color: rgba(251,191,36,0.2) !important; }
    .swagger-ui .opblock.opblock-put .opblock-summary-method, .swagger-ui .opblock.opblock-patch .opblock-summary-method { background: #d97706 !important; }
    .swagger-ui .opblock.opblock-delete { background: rgba(248,113,113,0.05) !important; border-color: rgba(248,113,113,0.2) !important; }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: #dc2626 !important; }

    /* Expanded body */
    .swagger-ui .opblock-body { background: var(--nexo-bg2) !important; }
    .swagger-ui .opblock-body pre.microlight, .swagger-ui .opblock-body pre { background: #0f172a !important; border-radius: 8px !important; border: 1px solid var(--nexo-border) !important; color: var(--nexo-green) !important; font-family: 'JetBrains Mono', monospace !important; font-size: 13px !important; }
    .swagger-ui .opblock-section-header { background: rgba(99,102,241,0.06) !important; border-bottom: 1px solid var(--nexo-border) !important; }
    .swagger-ui .opblock-section-header h4, .swagger-ui .opblock-section-header label { color: var(--nexo-text) !important; }
    .swagger-ui .opblock.is-open .opblock-summary { border-bottom: 1px solid var(--nexo-border) !important; }

    /* Parameters */
    .swagger-ui table thead tr th, .swagger-ui table thead tr td { color: var(--nexo-muted) !important; border-bottom: 1px solid var(--nexo-border) !important; }
    .swagger-ui .parameter__name { color: var(--nexo-text) !important; font-weight: 600 !important; }
    .swagger-ui .parameter__type { color: var(--nexo-accent2) !important; }
    .swagger-ui .parameter__name.required span { color: var(--nexo-red) !important; }

    /* Models */
    .swagger-ui section.models { border: 1px solid var(--nexo-border) !important; border-radius: 12px !important; background: rgba(17,24,39,0.6) !important; }
    .swagger-ui section.models h4 { color: var(--nexo-text) !important; }
    .swagger-ui .model { color: var(--nexo-muted) !important; }
    .swagger-ui .model .property.primitive { color: var(--nexo-accent2) !important; }
    .swagger-ui .model-title { color: var(--nexo-text) !important; }
    .swagger-ui .model-box { background: transparent !important; }

    /* Buttons */
    .swagger-ui .btn { border-radius: 8px !important; font-family: 'Inter', sans-serif !important; font-weight: 600 !important; transition: all 0.2s !important; }
    .swagger-ui .btn.execute { background: var(--nexo-accent) !important; border-color: var(--nexo-accent) !important; box-shadow: 0 0 16px var(--nexo-glow) !important; }
    .swagger-ui .btn.execute:hover { background: var(--nexo-accent2) !important; box-shadow: 0 0 24px var(--nexo-glow) !important; }
    .swagger-ui .btn.cancel { color: var(--nexo-muted) !important; border-color: var(--nexo-border) !important; }
    .swagger-ui .try-out__btn { color: var(--nexo-accent2) !important; border-color: var(--nexo-accent) !important; }
    .swagger-ui .btn.authorize { color: var(--nexo-green) !important; border-color: var(--nexo-green) !important; background: transparent !important; }
    .swagger-ui .btn.authorize:hover { background: rgba(52,211,153,0.1) !important; }
    .swagger-ui .btn.authorize svg { fill: var(--nexo-green) !important; }

    /* Auth modal */
    .swagger-ui .dialog-ux .modal-ux { background: var(--nexo-bg2) !important; border: 1px solid var(--nexo-border) !important; border-radius: 16px !important; box-shadow: 0 25px 60px rgba(0,0,0,0.6) !important; }
    .swagger-ui .dialog-ux .modal-ux-header h3 { color: var(--nexo-text) !important; }
    .swagger-ui .dialog-ux .modal-ux-content p, .swagger-ui .dialog-ux .modal-ux-content label { color: var(--nexo-muted) !important; }
    .swagger-ui .dialog-ux .modal-ux-header { border-bottom: 1px solid var(--nexo-border) !important; }

    /* Inputs */
    .swagger-ui input[type=text], .swagger-ui input[type=password], .swagger-ui textarea, .swagger-ui select {
      background: var(--nexo-bg3) !important; color: var(--nexo-text) !important; border: 1px solid var(--nexo-border) !important; border-radius: 8px !important; padding: 8px 12px !important; font-family: 'Inter', sans-serif !important;
    }
    .swagger-ui input[type=text]:focus, .swagger-ui textarea:focus { border-color: var(--nexo-accent) !important; box-shadow: 0 0 0 3px var(--nexo-glow) !important; outline: none !important; }

    /* Responses */
    .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5, .swagger-ui .response-col_status { color: var(--nexo-text) !important; }
    .swagger-ui .response-col_description__inner p { color: var(--nexo-muted) !important; }
    .swagger-ui .responses-table .response-col_status { color: var(--nexo-green) !important; font-weight: 700 !important; }

    /* Filter */
    .swagger-ui .filter .operation-filter-input { background: var(--nexo-bg3) !important; color: var(--nexo-text) !important; border: 1px solid var(--nexo-border) !important; border-radius: 10px !important; padding: 10px 16px !important; }

    /* Global text */
    .swagger-ui, .swagger-ui p, .swagger-ui span, .swagger-ui label { color: var(--nexo-muted) !important; }
    .swagger-ui h1, .swagger-ui h2, .swagger-ui h3, .swagger-ui h4, .swagger-ui h5 { color: var(--nexo-text) !important; font-family: 'Inter', sans-serif !important; }
    .swagger-ui a { color: var(--nexo-accent2) !important; }
    .swagger-ui a:hover { color: #a5b4fc !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--nexo-bg); }
    ::-webkit-scrollbar-thumb { background: var(--nexo-accent); border-radius: 4px; }

    /* Microlight */
    .swagger-ui .microlight { background: #0f172a !important; }
  </style>
</head>
<body>
  <div id="nexo-topbar">
    <div class="brand">
      <div class="diamond"></div>
      <h1>NEXO <span>API Documentation</span></h1>
    </div>
    <div class="links">
      <a href="/api/docs/" class="active">Swagger UI</a>
      <a href="/api/redoc/">ReDoc</a>
      <a href="/api/schema/">OpenAPI Schema</a>
      <a href="/admin/">Admin</a>
    </div>
  </div>

  <div id="swagger-ui"></div>

  <script src="{{ swagger_ui_bundle }}"></script>
  <script src="{{ swagger_ui_standalone }}"></script>
  <script>
    const ui = SwaggerUIBundle({
      url: "{{ schema_url }}",
      dom_id: '#swagger-ui',
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset
      ],
      layout: "BaseLayout",
      deepLinking: true,
      persistAuthorization: true,
      filter: true,
      requestInterceptor: function(request) {
        var csrfToken = document.cookie.match(/csrftoken=([^;]+)/);
        if (csrfToken) {
          request.headers['X-CSRFToken'] = csrfToken[1];
        }
        return request;
      },
    })
  </script>
</body>
</html>
